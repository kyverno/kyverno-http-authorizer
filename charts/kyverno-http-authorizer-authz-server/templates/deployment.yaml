apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "kyverno-http-authorizer-authz-server.name" . }}
  namespace: {{ template "kyverno.lib.namespace" . }}
  labels:
    {{- include "kyverno-http-authorizer-authz-server.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.deployment.replicas }}
  replicas: {{ . }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  {{- with .Values.deployment.updateStrategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kyverno-http-authorizer-authz-server.labels.selector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kyverno-http-authorizer-authz-server.labels" . | nindent 8 }}
        {{- with .Values.pod.labels }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.pod.annotations }}
      annotations: {{ tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.pod.imagePullSecrets }}
      imagePullSecrets:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.securityContext }}
      securityContext:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.pod.hostNetwork }}
      hostNetwork: {{ . }}
      {{- end }}
      {{- with .Values.pod.dnsPolicy }}
      dnsPolicy: {{ . }}
      {{- end }}
      affinity:
        {{- with .Values.pod.antiAffinity }}
        podAntiAffinity:
          {{- tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
        {{- with .Values.pod.affinity }}
        podAffinity:
          {{- tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
        {{- with .Values.pod.nodeAffinity }}
        nodeAffinity:
          {{- tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
      serviceAccountName: {{ template "kyverno-http-authorizer-authz-server.service-account.name" . }}
      containers:
        {{- with .Values.containers.server }}
        - name: server
          image: {{ include "kyverno-http-authorizer-authz-server.image" (mustMerge .image (dict "tag" (default $.Chart.Version $.Chart.AppVersion))) }}
          imagePullPolicy: {{ .image.pullPolicy }}
          {{- with .resources }}
          resources:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with .securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .startupProbe }}
          startupProbe:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with .livenessProbe }}
          livenessProbe:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with .readinessProbe }}
          readinessProbe:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          {{- with .ports }}
          ports:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          args:
          {{- with .args }}
            {{- range . }}
            - {{ tpl . $ | quote }}
            {{- end }}
          {{- end }}
          {{- with $.Values.standaloneAuthz }}
            - {{ printf "--probes-address=%s" .probesAddress | quote }}
            - {{ printf "--http-auth-server-address=%s" .httpAuthServerAddress | quote }}
            - {{ printf "--metrics-address=%s" .metricsAddress | quote }}
            - {{ printf "--kube-policy-source=%t" .kubePolicySource | quote }}
            {{- range .externalPolicySources }}
            - {{ printf "--external-policy-source=%s" . | quote }}
            {{- end }}
            {{- if .nestedRequest }}
            - "--nested-request"
            {{- end }}
          {{- end }}
          {{- with $.Values.kubeConfig }}
            {{- if .context }}
            - {{ printf "--kube-context=%s" .context | quote }}
            {{- end }}
            {{- if .cluster }}
            - {{ printf "--kube-cluster=%s" .cluster | quote }}
            {{- end }}
            {{- if .user }}
            - {{ printf "--kube-user=%s" .user | quote }}
            {{- end }}
            {{- if .namespace }}
            - {{ printf "--kube-namespace=%s" .namespace | quote }}
            {{- end }}
            {{- if .server }}
            - {{ printf "--kube-server=%s" .server | quote }}
            {{- end }}
            {{- if .certificateAuthority }}
            - {{ printf "--kube-certificate-authority=%s" .certificateAuthority | quote }}
            {{- end }}
            {{- if .certificateAuthorityData }}
            - {{ printf "--kube-certificate-authority-data=%s" .certificateAuthorityData | quote }}
            {{- end }}
            {{- if .clientCertificate }}
            - {{ printf "--kube-client-certificate=%s" .clientCertificate | quote }}
            {{- end }}
            {{- if .clientCertificateData }}
            - {{ printf "--kube-client-certificate-data=%s" .clientCertificateData | quote }}
            {{- end }}
            {{- if .clientKey }}
            - {{ printf "--kube-client-key=%s" .clientKey | quote }}
            {{- end }}
            {{- if .clientKeyData }}
            - {{ printf "--kube-client-key-data=%s" .clientKeyData | quote }}
            {{- end }}
            {{- if .token }}
            - {{ printf "--kube-token=%s" .token | quote }}
            {{- end }}
            {{- if .username }}
            - {{ printf "--kube-username=%s" .username | quote }}
            {{- end }}
            {{- if .password }}
            - {{ printf "--kube-password=%s" .password | quote }}
            {{- end }}
          {{- end }}
        {{- end }}
