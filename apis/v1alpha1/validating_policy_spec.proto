syntax = "proto3";

package kyverno.http.v1alpha1;

option go_package = "github.com/kyverno/kyverno-http-authorizer/apis/proto/v1alpha1";

import "google/protobuf/wrappers.proto";

// ValidatingPolicySpec is the specification of the desired behavior of the ValidatingPolicy.
message ValidatingPolicySpec {
  // MatchConstraints specifies what resources this policy is designed to validate.
  // The AdmissionPolicy cares about a request if it matches _all_ Constraints.
  // Required.
  optional MatchResources match_constraints = 1;

  // Validations contain CEL expressions which is used to apply the validation.
  // Validations and AuditAnnotations may not both be empty; a minimum of one Validations or AuditAnnotations is
  // required.
  repeated Validation validations = 2;

  // failurePolicy defines how to handle failures for the admission policy. Failures can
  // occur from CEL expression parse errors, type check errors, runtime errors and invalid
  // or mis-configured policy definitions or bindings.
  //
  // failurePolicy does not define how validations that evaluate to false are handled.
  //
  // When failurePolicy is set to Fail, the validationActions field define how failures are enforced.
  //
  // Allowed values are Ignore or Fail. Defaults to Fail.
  optional FailurePolicyType failure_policy = 3;

  // auditAnnotations contains CEL expressions which are used to produce audit
  // annotations for the audit event of the API request.
  // validations and auditAnnotations may not both be empty; a least one of validations or auditAnnotations is
  // required.
  repeated AuditAnnotation audit_annotations = 4;

  // MatchConditions is a list of conditions that must be met for a request to be validated.
  // Match conditions filter requests that have already been matched by the rules,
  // namespaceSelector, and objectSelector. An empty list of matchConditions matches all requests.
  // There are a maximum of 64 match conditions allowed.
  repeated MatchCondition match_conditions = 5;

  // Variables contain definitions of variables that can be used in composition of other expressions.
  // Each variable is defined as a named CEL expression.
  // The variables defined here will be available under `variables` in other expressions of the policy
  // except MatchConditions because MatchConditions are evaluated before the rest of the policy.
  repeated Variable variables = 6;

  // AutogenConfiguration defines the configuration for the generation controller.
  optional ValidatingPolicyAutogenConfiguration autogen = 7;

  // ValidationAction specifies the action to be taken when the matched resource violates the policy.
  // Required.
  repeated ValidationAction validation_actions = 8;

  // WebhookConfiguration defines the configuration for the webhook.
  optional WebhookConfiguration webhook_configuration = 9;

  // EvaluationConfiguration defines the configuration for the policy evaluation.
  optional EvaluationConfiguration evaluation = 10;
}

// EvaluationMode represents the mode of policy evaluation
enum EvaluationMode {
  EVALUATION_MODE_UNSPECIFIED = 0;
  EVALUATION_MODE_ENVOY = 1;
  EVALUATION_MODE_JSON = 2;
  EVALUATION_MODE_KUBERNETES = 3;
  EVALUATION_MODE_HTTP = 4;
}

// EvaluationConfiguration defines the configuration for policy evaluation
message EvaluationConfiguration {
  // Mode is the mode of policy evaluation.
  // Allowed values are "Kubernetes" or "JSON".
  // Optional. Default value is "Kubernetes".
  EvaluationMode mode = 1;

  // Admission controls policy evaluation during admission.
  optional AdmissionConfiguration admission = 2;

  // Background controls policy evaluation during background scan.
  optional BackgroundConfiguration background = 3;
}

// AdmissionConfiguration controls policy evaluation during admission
message AdmissionConfiguration {
  // Enabled controls if rules are applied during admission.
  // Optional. Default value is "true".
  optional google.protobuf.BoolValue enabled = 1;
}

// BackgroundConfiguration controls policy evaluation during background scan
message BackgroundConfiguration {
  // Enabled controls if rules are applied to existing resources during a background scan.
  // Optional. Default value is "true". The value must be set to "false" if the policy rule
  // uses variables that are only available in the admission review request (e.g. user name).
  optional google.protobuf.BoolValue enabled = 1;
}

// ValidatingPolicyAutogenConfiguration defines the configuration for the generation controller
message ValidatingPolicyAutogenConfiguration {
  // PodControllers specifies whether to generate a pod controllers rules.
  optional PodControllersGenerationConfiguration pod_controllers = 1;
  
  // ValidatingAdmissionPolicy specifies whether to generate a Kubernetes ValidatingAdmissionPolicy.
  optional VapGenerationConfiguration validating_admission_policy = 2;
}

// PodControllersGenerationConfiguration specifies pod controller generation settings
message PodControllersGenerationConfiguration {
  repeated string controllers = 1;
}

// VapGenerationConfiguration specifies ValidatingAdmissionPolicy generation settings
message VapGenerationConfiguration {
  // Enabled specifies whether to generate a Kubernetes ValidatingAdmissionPolicy.
  // Optional. Defaults to "false" if not specified.
  optional google.protobuf.BoolValue enabled = 1;
}

// WebhookConfiguration defines the configuration for the webhook
message WebhookConfiguration {
  // TimeoutSeconds specifies the maximum time in seconds allowed to apply this policy.
  // After the configured time expires, the admission request may fail, or may simply ignore the policy results,
  // based on the failure policy. The default timeout is 10s, the value must be between 1 and 30 seconds.
  optional google.protobuf.Int32Value timeout_seconds = 1;
}

// FailurePolicyType defines how to handle failures for the admission policy
enum FailurePolicyType {
  FAILURE_POLICY_TYPE_UNSPECIFIED = 0;
  FAILURE_POLICY_TYPE_IGNORE = 1;
  FAILURE_POLICY_TYPE_FAIL = 2;
}

// ValidationAction specifies the action to be taken when the matched resource violates the policy
enum ValidationAction {
  VALIDATION_ACTION_UNSPECIFIED = 0;
  VALIDATION_ACTION_DENY = 1;
  VALIDATION_ACTION_AUDIT = 2;
  VALIDATION_ACTION_WARN = 3;
}

// MatchResources specifies what resources this policy is designed to validate
message MatchResources {
  // NamespaceSelector decides whether to run the admission control policy on an object based
  // on whether the namespace for that object matches the selector. If the
  // object itself is a namespace, the matching is performed on
  // object.metadata.labels. If the object is another cluster scoped resource,
  // it never skips the policy.
  optional LabelSelector namespace_selector = 1;

  // ObjectSelector decides whether to run the validation based on if the
  // object has matching labels. objectSelector is evaluated against both
  // the oldObject and newObject that would be sent to the cel validation, and
  // is considered to match if either object matches the selector. A null
  // object (oldObject in the case of create, or newObject in the case of
  // delete) or an object that cannot have labels (like a
  // DeploymentRollback or a PodProxyOptions object) is not considered to
  // match.
  optional LabelSelector object_selector = 2;

  // ResourceRules describes what operations on what resources/subresources the ValidatingAdmissionPolicy matches.
  // The policy cares about an operation if it matches _any_ Rule.
  repeated NamedRuleWithOperations resource_rules = 3;

  // ExcludeResourceRules describes what operations on what resources/subresources the ValidatingAdmissionPolicy should not care about.
  // The exclude rules take precedence over include rules (if a resource matches both, it is excluded)
  repeated NamedRuleWithOperations exclude_resource_rules = 4;

  // matchPolicy defines how the "MatchResources" list is used to match incoming requests.
  // Allowed values are "Exact" or "Equivalent".
  optional MatchPolicyType match_policy = 5;
}

// MatchPolicyType defines how the "MatchResources" list is used to match incoming requests
enum MatchPolicyType {
  MATCH_POLICY_TYPE_UNSPECIFIED = 0;
  MATCH_POLICY_TYPE_EXACT = 1;
  MATCH_POLICY_TYPE_EQUIVALENT = 2;
}

// LabelSelector represents a label selector
message LabelSelector {
  // matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
  // map is equivalent to an element of matchExpressions, whose key field is "key", the
  // operator is "In", and the values array contains only "value". The requirements are ANDed.
  map<string, string> match_labels = 1;

  // matchExpressions is a list of label selector requirements. The requirements are ANDed.
  repeated LabelSelectorRequirement match_expressions = 2;
}

// LabelSelectorRequirement represents a selector requirement
message LabelSelectorRequirement {
  // key is the label key that the selector applies to.
  string key = 1;

  // operator represents a key's relationship to a set of values.
  // Valid operators are In, NotIn, Exists and DoesNotExist.
  string operator = 2;

  // values is an array of string values. If the operator is In or NotIn,
  // the values array must be non-empty. If the operator is Exists or DoesNotExist,
  // the values array must be empty. This array is replaced during a strategic
  // merge patch.
  repeated string values = 3;
}

// NamedRuleWithOperations represents a rule with operations
message NamedRuleWithOperations {
  // ResourceNames is an optional white list of names that the rule applies to.  An empty set means that everything is allowed.
  repeated string resource_names = 1;

  // Rule represents the rule
  Rule rule = 2;
}

// Rule represents a rule
message Rule {
  // APIGroups is the API groups the resources belong to. '*' is all groups.
  // If '*' is present, the length of the slice must be one.
  repeated string api_groups = 1;

  // APIVersions is the API versions the resources belong to. '*' is all versions.
  // If '*' is present, the length of the slice must be one.
  repeated string api_versions = 2;

  // Resources is a list of resources this rule applies to.
  repeated string resources = 3;

  // Scope specifies the scope of this rule.
  // Valid values are "Cluster", "Namespaced", and "*"
  // "Cluster" means that only cluster-scoped resources will match this rule.
  // Namespaced objects are cluster-scoped, so "Namespaced" will not match any objects.
  // "*" means that there are no scope restrictions.
  // Subresources match the scope of their parent resource.
  // Default is "*".
  optional string scope = 4;
}

// Validation represents a validation rule
message Validation {
  // Expression represents the expression which will be evaluated by CEL.
  // ref: https://github.com/google/cel-spec
  // CEL expressions have access to the contents of the API request/response, organized into CEL variables as well as some other useful variables:
  string expression = 1;

  // Message represents the message displayed when validation fails. The message is required if the Expression contains
  // line breaks. The message must not contain line breaks.
  // If unset, the message is "failed rule: {Rule}".
  // e.g. "must be a URL with the host matching spec.host"
  // If the Expression contains line breaks. Message is required.
  // The message must not contain line breaks.
  // If unset, the message is "failed rule: {Rule}".
  optional string message = 2;

  // Reason represents a machine-readable description of why this validation failed.
  // If this is the first validation in the list to fail, this reason will be used as the
  // CRD's overall validation error reason.  Must be a valid HTTP error reason or empty.
  optional string reason = 3;

  // messageExpression declares a CEL expression that evaluates to the validation failure message that is returned when this rule fails.
  // Since messageExpression is used as a failure message, it must evaluate to a string.
  // If both message and messageExpression are present on a validation, then messageExpression will be used if validation fails.
  // If messageExpression results in a runtime error, the runtime error is logged, and the validation failure message is produced
  // as if the messageExpression field were unset. If messageExpression evaluates to an empty string, a string with only spaces, or a string
  // that contains line breaks, then the validation failure message will also be produced as if the messageExpression field were unset, and
  // the fact that messageExpression produced an empty string/string with only spaces/string with line breaks will be logged.
  // messageExpression has access to all the same variables as the `expression` except for 'authorizer' and 'authorizer.requestResource'.
  // Example:
  // "object.x must be less than max ("+string(params.max)+")"
  optional string message_expression = 4;
}

// AuditAnnotation represents an audit annotation
message AuditAnnotation {
  // key specifies the audit annotation key. The audit annotation keys of
  // a ValidatingAdmissionPolicy must be unique. The key must be a qualified
  // name ([A-Za-z0-9][-A-Za-z0-9_.]*) no more than 63 bytes in length.
  string key = 1;

  // valueExpression represents the expression which is evaluated by CEL to
  // produce an audit annotation value. The expression must evaluate to either
  // a string or null value. If the expression evaluates to a string, the
  // audit annotation is included with the string value. If the expression
  // evaluates to null or empty string the audit annotation will be omitted.
  // The valueExpression may be no longer than 5kb in length.
  // If the result of the valueExpression is more than 10kb in length, it
  // will be truncated to 10kb.
  string value_expression = 2;
}

// MatchCondition represents a condition that must be met for a request to be validated
message MatchCondition {
  // Name is an identifier for this match condition, used for strategic merging of MatchConditions,
  // as well as providing an identifier for logging purposes. A good name should be descriptive of
  // the associated expression.
  // Name must be a qualified name consisting of alphanumeric characters, '-', '_' or '.', and
  // must start and end with an alphanumeric character (e.g. 'MyName',  or 'my.name',  or
  // '123-abc', regex used for validation is '([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9]') with an
  // optional DNS subdomain prefix and '/' (e.g. 'example.com/MyName')
  string name = 1;

  // Expression represents the expression which will be evaluated by CEL. Must evaluate to bool.
  // CEL expressions have access to the contents of the AdmissionRequest and Authorizer, organized into CEL variables:
  string expression = 2;
}

// Variable represents a variable definition
message Variable {
  // Name is the name of the variable. The name must be a valid CEL identifier and unique among all variables.
  // The variable can be accessed in other expressions through `variables`
  // For example, if name is "foo", the variable will be available as `variables.foo`
  string name = 1;

  // Expression is the expression that will be evaluated as the value of the variable.
  // The CEL expression has access to the same identifiers as the CEL expressions in Validation.
  string expression = 2;
}

// Request message for validating policy operations
message ValidatingPolicyRequest {
  // The validating policy specification to process
  ValidatingPolicySpec spec = 1;
  
  // Optional metadata for the request
  map<string, string> metadata = 2;
  
  // Request ID for tracking
  string request_id = 3;
}

// Response message for validating policy operations
message ValidatingPolicyResponse {
  // Success indicates if the operation was successful
  bool success = 1;
  
  // Message provides additional information about the result
  string message = 2;
  
  // Response metadata
  map<string, string> metadata = 3; 
  
  // Request ID for correlation
  string request_id = 4;
}

// ValidatingPolicyService provides bidirectional communication for validating policies
service ValidatingPolicyService {  
  // Bidirectional streaming: Real-time policy validation and feedback
  rpc ValidatePoliciesStream(stream ValidatingPolicyRequest) returns (stream ValidatingPolicyResponse);
}
